openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and audio operations
  - name: emma
    description: Emma voice, speech, search, and deep link operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text/SSE response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /emma/transcribe:
    post:
      operationId: emmaTranscribe
      tags: [emma]
      summary: Transcribe audio to text using Whisper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmmaTranscribeInput"
      responses:
        "200":
          description: Transcript text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmmaTranscribeOutput"
  /emma/speak:
    post:
      operationId: emmaSpeak
      tags: [emma]
      summary: Convert text to speech using OpenAI TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmmaSpeakInput"
      responses:
        "200":
          description: Audio as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmmaSpeakOutput"
  /emma/search:
    post:
      operationId: emmaSearch
      tags: [emma]
      summary: Web search with page content extraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmmaSearchInput"
      responses:
        "200":
          description: Search results and page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmmaSearchOutput"
  /emma/deeplink:
    post:
      operationId: emmaDeeplink
      tags: [emma]
      summary: Parse app intent and return deep link URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmmaDeeplinkInput"
      responses:
        "200":
          description: Deep link result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmmaDeeplinkOutput"
        "404":
          description: No app intent detected
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    EmmaTranscribeInput:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
        format:
          type: string
          description: Audio format (m4a, mp4, webm)
      required:
        - audio
    EmmaTranscribeOutput:
      type: object
      properties:
        transcript:
          type: string
      required:
        - transcript
    EmmaSpeakInput:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    EmmaSpeakOutput:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded MP3 audio
      required:
        - audio
    EmmaSearchInput:
      type: object
      properties:
        query:
          type: string
        maxResults:
          type: integer
      required:
        - query
    EmmaSearchResult:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        snippet:
          type: string
      required:
        - title
        - url
        - snippet
    EmmaSearchPage:
      type: object
      properties:
        url:
          type: string
        content:
          type: string
      required:
        - url
        - content
    EmmaSearchOutput:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EmmaSearchResult"
        pages:
          type: array
          items:
            $ref: "#/components/schemas/EmmaSearchPage"
      required:
        - results
        - pages
    EmmaDeeplinkInput:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    EmmaDeeplinkOutput:
      type: object
      properties:
        app:
          type: string
        scheme:
          type: string
        fallback:
          type: string
        webUrl:
          type: string
        displayName:
          type: string
      required:
        - app
        - scheme
        - fallback
        - webUrl
        - displayName
